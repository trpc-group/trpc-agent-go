version: 1
commands:
  allowed: [go, cat, echo, curl, wget, bash, sleep, yes]
  denied: [rm, dd, mkfs, shutdown, reboot, nc, ssh, sudo]
paths:
  denied: [~/.ssh, ~/.aws, /etc, /root, .env, credentials.json, id_rsa, id_ed25519]
network:
  allowed_domains: [api.github.com]
limits:
  max_timeout: 30s
  max_output_bytes: 1048576
  max_sleep: 10s
  max_concurrency: 8
environment:
  allowed: [LANG, LC_ALL, TMPDIR]
