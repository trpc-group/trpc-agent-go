                - Event: event.md
                - Evaluation: evaluation.md
                - PromptIter: promptiter.md
            - 服务:
              - Gateway: gateway.md
              - tRPC-Agent API: trpcagent.md
              - AG-UI:
                - 总览: agui/index.md
                - 实时对话路由: agui/chat.md
                - 消息快照路由: agui/history.md
                - 取消路由: agui/cancel.md
              - A2A: a2a.md
              - A2UI: a2ui.md
              - OpenClaw Runtime: openclaw-runtime.md
            - 可观测:
                - 概览: observability.md
                - 多模态遥测: telemetry-multimodal.md
            - 生态: ecosystem.md
            - 博客:
                - "构建智能 AI 应用的 Go 语言 Agent 框架": blog/trpcagentgo.md
                - "长任务 Agent 上下文管理的设计与评测": blog/summary.md
                - "看见 Agent 运行时：tRPC-Agent-Go 可观测的设计与取舍": blog/observability.md
                - "降低 Agent Token 成本：tRPC-Agent-Go 的 Prompt Cache 工程实践": blog/promptcache.md
                - "从对话到执行：tRPC-Agent-Go Code Executor 如何为 Agent 构建可控运行环境": blog/codeexecutor.md
                - "GraphAgent 让 AI 工作流与 Agent 无缝融合": blog/graphagent.md
                - "快速构建基于 AG-UI 的 Agent 服务": blog/agui.md
                - "Anthropic Agent Skills 规范的 Go 原生实现": blog/skill.md
                - "AI Agent 自动化评估范式与工程实践全解析": blog/evaluation.md
                - "AI Agent 高质量稳定性提升方法": blog/llmverifier.md
                - "打造企业级安全可控的 OpenClaw Runtime": blog/openclaw.md
                - "AI Agent 提示词自动迭代与工程实践全解析": blog/promptiter.md
                - "把工作放到合适边界：tRPC-Agent-Go Multi-Agent 设计与选型": blog/multiagent-boundaries.md
  - git-revision-date-localized:
      enable_creation_date: true
      type: iso_datetime

theme:
  name: material
  features:
    - content.code.copy
    - navigation.footer
    - navigation.tabs
    - search.suggest
    - search.share
    - content.action.edit
    - content.action.view
  logo: assets/img/logo.png
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
      linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
  - mdx_truly_sane_lists

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - assets/javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra:
  analytics:
    provider: google
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/emoticon-happy-outline
          name: This page was helpful
          data: 1
          note: >-
            Thanks for your feedback!
        - icon: material/emoticon-sad-outline
          name: This page could be improved
          data: 0
          note: >-
            Thanks for your feedback!<br>Please help us improve by
            opening an <a href="https://github.com/trpc-group/trpc-agent-go/issues/new" target="_blank" rel="noopener">issue</a>.
