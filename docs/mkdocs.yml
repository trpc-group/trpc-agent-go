plugins:
  - search
  - i18n:
      docs_structure: folder
      reconfigure_material: true
      languages:
        - locale: en
          name: English
          build: true
          default: true
        - locale: zh
          name: 中文
          build: true
          nav:
            - 概览: index.md
            - 组件:
                - Agent:
                    - Agent: agent.md
                    - Goal 扩展: goal.md
                    - Multi Agent: multiagent.md
                    - 动态工作流: dynamic-workflow.md
                    - Task Run 运行时: taskrun.md
                    - Team: team.md
                    - Graph Agent: graph.md
                    - 自定义 Agent: custom-agent.md
                    - Dify Agent: dify.md
                    - Claude Code Agent: claudecode.md
                    - Codex Agent: codex.md
                - Runner: runner.md
                - Code Executor: codeexecutor.md
                - CodeAct: codeact.md
                - 错误处理: error-handling.md
                - Model: model.md
                - Prompt Template: prompt.md
                - Callbacks: callbacks.md
                - Plugins: plugin.md
                - Memory: memory.md
                - Artifact: artifact.md
                - Skill: skill.md
                - Evolution: evolution.md
                - Tool: tool.md
                - Session:
                    - Overview: session/index.md
                    - Session Summary: session/summary.md
                    - Memory Session: session/inmemory.md
                    - SQLite Session: session/sqlite.md
                    - Redis Session: session/redis.md
                    - MySQL Session: session/mysql.md
                    - TDSQL Session: session/tdsql.md
                    - PostgreSQL Session: session/postgres.md
                    - PGVector Session: session/pgvector.md
                    - ClickHouse Session: session/clickhouse.md
                    - MongoDB Session: session/mongodb.md
                - Knowledge:
                    - 概述: knowledge/index.md
                    - Embedder: knowledge/embedder.md
                    - Reranker: knowledge/reranker.md
                    - Query Enhancer: knowledge/query-enhancer.md
                    - 数据源: knowledge/source.md
                    - 代码知识库（Code RAG, Beta）: knowledge/code-rag.md
                    - 内容提取器: knowledge/extractor.md
                    - 过滤器: knowledge/filter.md
                    - 知识库管理: knowledge/management.md
                    - OCR: knowledge/ocr.md
                    - 向量存储:
                        - 概述: knowledge/vectorstore/index.md
                        - Memory: knowledge/vectorstore/inmemory.md
                        - PGVector: knowledge/vectorstore/pgvector.md
                        - TcVector: knowledge/vectorstore/tcvector.md
                        - Elasticsearch: knowledge/vectorstore/elasticsearch.md
                        - Qdrant: knowledge/vectorstore/qdrant.md
                        - Milvus: knowledge/vectorstore/milvus.md
