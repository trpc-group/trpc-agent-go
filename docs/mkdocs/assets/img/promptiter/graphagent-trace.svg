  <rect class="agent" x="1260" y="270" width="250" height="126" rx="10" />
  <text class="step" x="1385" y="304" text-anchor="middle">s7</text>
  <text class="node-name" x="1385" y="335" text-anchor="middle">candidate/review</text>
