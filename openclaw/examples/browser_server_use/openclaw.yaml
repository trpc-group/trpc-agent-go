app_name: "openclaw"

http:
  addr: ":8080"

agent:
  instruction: |
    You are a helpful assistant.
    Use browser for JS-heavy sites, page interactions, screenshots,
    and current-tab relay workflows.

model:
  mode: "openai"
  name: "gpt-5"
  openai_variant: "auto"

tools:
  providers:
    - type: "browser"
      name: "browser-runtime"
      config:
        default_profile: "openclaw"
        evaluate_enabled: false
        server_url: "http://127.0.0.1:19790"
        sandbox_server_url: "http://127.0.0.1:20790"
        profiles:
          - name: "openclaw"
            description: "Managed Playwright profile from browser-server."
          - name: "chrome"
            description: "Current Chromium tab attached through relay."
        nodes:
          - id: "edge"
            server_url: "http://127.0.0.1:29790"
