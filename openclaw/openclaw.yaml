app_name: "openclaw"

http:
  addr: ":8080"

admin:
  enabled: true
  addr: "127.0.0.1:19789"
  auto_port: true

agent:
  instruction: |
    You are a helpful assistant. Reply in a friendly tone.
    Use browser for JS-heavy sites, page interactions, snapshots,
    screenshots, downloads, uploads, and current-tab relay workflows.

model:
  mode: "openai"
  name: "gpt-5"
  openai_variant: "auto"
  # Optional static headers for OpenAI-compatible gateways. OPENAI_HEADERS
  # can also provide space-, comma-, or newline-separated KEY=VALUE pairs
  # and supports quoted values such as Authorization="Bearer token".
  # headers:
  #   X-Example-User: "alice"
  #   X-Example-Token: "Bearer token-with-space"

# skills:
#   extra_dirs:
#     - "${HOME}/.codex/skills"
#     - "./.agents/skills"
#   watch: true
#   watch_bundled: false
#   watch_debounce_ms: 250
#   load_mode: "turn" # once|turn|session

# Evolution is disabled by default. Set enabled to true to opt into
# asynchronous skill learning.
# evolution:
#   enabled: false
#   skill_scope:
#     mode: "app" # none|app|user
#   human_gate: "" # always|create

tools:
  enable_parallel_tools: true
  # Optional: expose compact tool_search + dynamic_agent entrypoints
  # when direct tool declarations exceed the auto threshold.
  # Default mode is auto. Set defer_to_dynamic_agent_mode: on to force
  # it on, or defer_to_dynamic_agent_mode: off to disable it.
  # defer_to_dynamic_agent_mode: auto # off|on|auto
  # defer_to_dynamic_agent_threshold_chars: 4000
  # dynamic_agent_timeout: "180s"
  # Set false to expose only tool_search/dynamic_agent plus
  # defer_direct_tools, useful for token-sensitive benchmark profiles.
  # defer_default_direct_tools: true
  # defer_direct_tools: ["exec_command"]
  # Optional: default timeout for host exec_command calls when timeout_sec is
  # omitted. Leave unset to keep the built-in host exec default.
  # host_exec_default_timeout: "60s"
  # code_executor:
  #   type: "sandbox" # sandbox; leave empty/unset to inherit enable_local_exec
  #   auto_execute_code_blocks: true
  #   sandbox:
  #     workspace_root: "" # default: state_dir/sandbox
  #     backend: "auto" # auto|linux-bubblewrap
  #     profile: "workspace_write" # workspace_write|read_only|disabled
  #     network: "restricted" # restricted|enabled
  #     default_timeout: "30s"
  #     output_max_bytes: 1048576
  #     shell_env:
  #       inherit: "core" # all|core|none
  #       apply_default_excludes: true
  providers:
    - type: "browser"
      name: "browser-runtime"
      config:
        default_profile: "openclaw"
        evaluate_enabled: false
        server_url: "http://127.0.0.1:19790"
        sandbox_server_url: "http://127.0.0.1:20790"
        profiles:
          - name: "openclaw"
            description: "Managed Playwright profile from browser-server."
          - name: "chrome"
            description: "Current Chromium tab attached through relay."

channels:
  - type: "telegram"
    config:
      token: "${TELEGRAM_BOT_TOKEN}"
      streaming: "progress"
      http_timeout: "60s"

session:
  backend: "inmemory"
  summary:
    enabled: false

memory:
  backend: "inmemory"
  auto:
    enabled: false
